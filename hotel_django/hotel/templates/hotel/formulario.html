{% load static %}

<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Administración de Habitaciones | Hotel Quinta Dalam</title>

    <link rel="stylesheet" href="{% static 'hotel/css/estilos.css' %}">
    <link rel="stylesheet" href="{% static 'hotel/css/formulario.css' %}">

</head>

<body>

<header>

    <h1>Hotel Quinta Dalam</h1>

    <nav>

        <a href="{% url 'index' %}">Inicio</a>

        <a href="{% url 'catalogo' %}">Habitaciones</a>

        <a href="{% url 'contacto' %}">Contacto</a>

        <a href="{% url 'formulario' %}" class="activo">
            Administrar
        </a>

    </nav>

</header>

<section class="hero">

    <h2>Administración de Habitaciones</h2>

    <p>
        Gestión interna de habitaciones.
    </p>

</section>

<main>

    <section class="form-wrapper">

        <div class="form-card">

            <h2>Formulario de Gestión</h2>

            <form id="formHabitaciones" method="post" enctype="multipart/form-data">

                {% csrf_token %}

                <div class="form-group">

                    <label for="id">ID</label>

                    <input type="text" id="id" name="id" required>

                </div>

                <div class="form-group">

                    <label for="nombre">Nombre</label>

                    <input type="text" id="nombre" name="nombre" required>

                </div>

                <div class="form-group">

                    <label for="descripcion">Descripción</label>

                    <textarea id="descripcion" name="descripcion" required></textarea>

                </div>

                <div class="form-group">

                    <label for="precio">Precio</label>

                    <input type="number" id="precio" name="precio" required>

                </div>

                <div class="form-group">

                    <label for="tipo">Tipo</label>

                    <select id="tipo" name="tipo">

                        <option>Individual</option>

                        <option>Doble</option>

                        <option>Suite</option>

                    </select>

                </div>

                <div class="form-group">

                    <label for="imagenFile">
                        Subir imagen
                    </label>

                    <input type="file"
                           id="imagenFile"
                           name="imagenFile"
                           accept="image/*">

                </div>

                <div class="form-group">

                    <label for="imagenURL">
                        O pegar URL de imagen
                    </label>

                    <input type="text"
                           id="imagenURL"
                           name="imagenURL"
                           placeholder="https://...">

                </div>

                <div class="form-buttons">

                    <button type="button" id="btnAlta">
                        Alta
                    </button>

                    <button type="button" id="btnModificar">
                        Modificar
                    </button>

                    <button type="button" id="btnEliminar">
                        Eliminar
                    </button>

                </div>

            </form>

        </div>

    </section>

</main>

<footer>

    <p>© 2026 Hotel Quinta Dalam</p>

</footer>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

<script src="{% static 'hotel/js/main.js' %}"></script>

</body>

</html>
